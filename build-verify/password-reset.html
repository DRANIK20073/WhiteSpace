<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Смена пароля</title>
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --dark-gray: #1f2937;
            --medium-gray: #6b7280;
            --light-gray: #f3f4f6;
            --border: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--black) 0%, var(--dark-gray) 55%, #374151 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-gray);
        }

        .card {
            width: min(460px, 92vw);
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.22);
            padding: 32px;
        }

        .brand {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--medium-gray);
            margin-bottom: 8px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            font-weight: 700;
            color: var(--black);
        }

        p {
            color: var(--medium-gray);
            margin: 0 0 20px;
            line-height: 1.5;
            font-size: 15px;
        }

        label {
            display: block;
            margin: 14px 0 8px;
            font-weight: 600;
            color: var(--dark-gray);
            font-size: 14px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
            background: var(--light-gray);
        }

        input:focus {
            outline: 2px solid var(--dark-gray);
            outline-offset: 0;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 13px 16px;
            border: 0;
            border-radius: 8px;
            background: var(--black);
            color: var(--white);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover:not(:disabled) {
            background: var(--dark-gray);
        }

        button:disabled {
            opacity: 0.65;
            cursor: progress;
        }

        .message {
            margin-top: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            display: none;
            line-height: 1.4;
            font-size: 14px;
        }

        .message.error {
            background: var(--light-gray);
            color: var(--black);
            border: 1px solid var(--border);
        }

        .message.success {
            background: var(--light-gray);
            color: var(--black);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">WHITESPACE</div>
        <h1>Смена пароля</h1>
        <p>Введите новый пароль для аккаунта, к которому относится письмо восстановления.</p>

        <form id="resetForm">
            <label for="password">Новый пароль</label>
            <input id="password" type="password" minlength="6" autocomplete="new-password" required>

            <label for="confirmPassword">Повторите пароль</label>
            <input id="confirmPassword" type="password" minlength="6" autocomplete="new-password" required>

            <button id="submitButton" type="submit">Сменить пароль</button>
        </form>

        <div id="errorMessage" class="message error"></div>
        <div id="successMessage" class="message success"></div>
    </div>

    <script>
        function getUrlParams() {
            const params = {};

            const parsePart = (part) => {
                if (!part) {
                    return;
                }

                part.split('&').forEach(pair => {
                    const [key, value] = pair.split('=');
                    if (key) {
                        params[key] = decodeURIComponent(value || '');
                    }
                });
            };

            parsePart(window.location.search.substring(1));
            parsePart(window.location.hash.substring(1));

            return params;
        }

        function showMessage(id, text) {
            const error = document.getElementById('errorMessage');
            const success = document.getElementById('successMessage');

            error.style.display = 'none';
            success.style.display = 'none';
            error.textContent = '';
            success.textContent = '';

            const target = document.getElementById(id);
            target.textContent = text;
            target.style.display = 'block';
        }

        async function submitPasswordReset(password) {
            const params = getUrlParams();
            const payload = {
                accessToken: params.access_token || null,
                refreshToken: params.refresh_token || null,
                tokenHash: params.token_hash || null,
                newPassword: password
            };

            const url = `http://127.0.0.1:54322/auth/reset-password?data=${encodeURIComponent(JSON.stringify(payload))}`;
            const response = await fetch(url);
            const result = await response.json();

            if (!response.ok || !result.success) {
                throw new Error(result.message || 'Не удалось сменить пароль.');
            }

            return result.message;
        }

        document.getElementById('resetForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitButton = document.getElementById('submitButton');

            if (password.length < 6) {
                showMessage('errorMessage', 'Пароль должен содержать минимум 6 символов.');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('errorMessage', 'Пароли не совпадают.');
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = 'Сохраняем...';

            try {
                const successMessage = await submitPasswordReset(password);
                showMessage('successMessage', successMessage);
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(() => window.close(), 4000);
            } catch (error) {
                showMessage('errorMessage', error.message || 'Не удалось сменить пароль.');
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Сменить пароль';
            }
        });

        window.addEventListener('load', () => {
            const params = getUrlParams();
            if (!params.access_token && !params.token_hash) {
                showMessage('errorMessage', 'Ссылка восстановления недействительна или устарела.');
            }
        });
    </script>
</body>
</html>
